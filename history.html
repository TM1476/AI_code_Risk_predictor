<!DOCTYPE html>
<html>
<head>
    <title>Sentinel | History</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #30363d; padding: 12px; text-align: left; }
        th { background: #161b22; color: #58a6ff; }
        .grade { font-weight: bold; color: #3fb950; }
    </style>
</head>
<body>
    <h1>Audit History</h1>
    <table id="historyTable">
        <thead><tr><th>Time</th><th>Grade</th><th>Score</th><th>Vulnerabilities</th></tr></thead>
        <tbody id="historyBody"></tbody>
    </table>
    <script>
        async function load() {
            const res = await fetch('/api/history');
            const data = await res.json();
            document.getElementById('historyBody').innerHTML = data.map(row => `
                <tr>
                    <td>${row.timestamp}</td>
                    <td class="grade">${row.complexity_grade}</td>
                    <td>${row.risk_score}</td>
                    <td>${row.vulnerabilities}</td>
                </tr>
            `).join('');
        }
        load();
    </script>
</body>
</html>
